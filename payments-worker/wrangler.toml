"$schema" = "../node_modules/wrangler/config-schema.json"
name = "change-life-os-payments"
main = "src/index.ts"
compatibility_date = "2026-07-19"
workers_dev = true
send_metrics = false

[vars]
ALLOWED_ORIGINS = "https://matthew-altx.github.io,http://localhost:5173,http://localhost:4173"
SUCCESS_URL = "https://matthew-altx.github.io/change-life-os/"

[[d1_databases]]
binding = "DB"
database_name = "change-life-os-payments"
database_id = "00000000-0000-0000-0000-000000000000"
migrations_dir = "migrations"
